name: Générer les articles Stenen News

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Installer dépendances
        run: pip install feedparser requests
      - name: Générer les articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 generate_articles.py
      - name: Commit
        run: |
          git config user.name "Stenen News Bot"
          git config user.email "bot@stenen.fr"
          git add articles.json
          git diff --staged --quiet || git commit -m "Articles $(date '+%d/%m/%Y')"
          git push
